<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | SkyTrack</title>
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body class="bg-sky-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm border-0 p-5">
            <h1 class="h4 text-primary mb-4 text-center">Reset Your Password</h1>
            <div id="statusMessage" class="alert d-none"></div>
            <form id="resetForm" action="/reset-password" method="POST">
              <input type="hidden" name="token" id="tokenInput" />
              <div class="mb-3">
                <label class="form-label">New Password</label>
                <input name="password" type="password" class="form-control" required minlength="8" />
              </div>
              <button class="btn btn-primary w-100">Update Password</button>
            </form>
            <div class="text-center mt-3 text-muted">
              <a href="/login">Back to Home</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const status = params.get('status');
      const el = document.getElementById('statusMessage');
      const tokenInput = document.getElementById('tokenInput');

      if (!token) {
        el.className = 'alert alert-danger';
        el.textContent = 'Reset token missing. Please use the link from your email.';
        el.classList.remove('d-none');
        document.getElementById('resetForm').style.display = 'none';
      } else {
        tokenInput.value = token;
      }

      if (status) {
        el.classList.remove('d-none');
        if (status === 'invalid') {
          el.className = 'alert alert-danger';
          el.textContent = 'Reset link is invalid or has expired.';
          document.getElementById('resetForm').style.display = 'none';
        } else if (status === 'failed') {
          el.className = 'alert alert-danger';
          el.textContent = 'Unable to reset password. Please try again.';
        }
      }
    </script>
  </body>
</html>
